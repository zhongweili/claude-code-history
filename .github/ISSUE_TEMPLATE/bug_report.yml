name: Bug Report
description: Report incorrect data, broken UI, or build issues
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Screenshots, browser info, version numbers, etc.
