name: Update Data & Deploy

on:
  schedule:
    # UTC 01:00 = Beijing 09:00, daily
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      full_run:
        description: "Run full pipeline (not incremental)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: update-deploy
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Incremental update (or full if triggered manually)
      - name: Update data
        run: |
          if [ "${{ inputs.full_run }}" = "true" ]; then
            echo "Running full pipeline..."
            bun agent/update.ts
          else
            echo "Running incremental pipeline..."
            bun agent/update.ts --incremental
          fi
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Install site dependencies and build
      - name: Build site
        run: cd site && bun install --frozen-lockfile && bun run build

      # Commit and push data changes (with rebase to handle concurrent pushes)
      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto_bundle.json data/capabilities_seed.json data/epochs_seed.json
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "auto: update claude code data [skip ci]"
            git pull --rebase origin master
            git push origin master
          fi

      # Deploy to Cloudflare Workers (Static Assets)
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
